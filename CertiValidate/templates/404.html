{% extends 'base.html' %}

{% block content %}
<div class="container my-5 pt-4 text-center" data-aos="zoom-in">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <lottie-player src="https://assets8.lottiefiles.com/packages/lf20_suhe7qtm.json" background="transparent"
                speed="1" style="width: 100%; height: 400px;" loop autoplay></lottie-player>
            <h1 class="display-1 fw-bold text-primary">404</h1>
            <h3 class="fw-bold mb-3">Page Not Found</h3>
            <p class="text-muted mb-4">The page or resource you are looking for has been moved, deleted, or never
                existed.</p>
            <a href="{{ url_for('index') }}" class="btn btn-primary btn-lg rounded-pill shadow px-4"><i
                    class="fa-solid fa-house me-2"></i> Return to Home</a>
        </div>
    </div>
</div>
{% endblock %}
