{% extends 'base.html' %}

{% block content %}
<div class="container my-5 pt-4">
    <div class="row align-items-center justify-content-center">
        <!-- Animation Column -->
        <div class="col-lg-5 d-none d-lg-block text-center" data-aos="fade-right">
            <lottie-player src="https://assets8.lottiefiles.com/packages/lf20_mjlh3hcy.json" background="transparent"
                speed="1" style="width: 100%; height: 400px;" loop autoplay></lottie-player>
            <h3 class="fw-bold mt-4">Welcome Back!</h3>
            <p class="text-muted">Access your dashboard to verify and secure certificates.</p>
        </div>

        <!-- Login Form Column -->
        <div class="col-lg-5 col-md-8 col-sm-10" data-aos="fade-left">
            <div class="card glass-card p-5 shadow-lg border-0 rounded-4">
                <div class="text-center mb-4">
                    <div class="bg-primary bg-opacity-10 rounded-circle d-inline-block p-3 mb-3">
                        <i class="fa-solid fa-user-lock fa-2x text-primary"></i>
                    </div>
                    <h2 class="fw-bold">Sign In</h2>
                    <p class="text-muted">Enter your credentials below</p>
                </div>

                <form action="{{ url_for('login') }}" method="POST" class="needs-validation">
                    <div class="mb-4 position-relative">
                        <label for="email" class="form-label fw-bold small text-muted">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i
                                    class="fa-solid fa-envelope text-muted"></i></span>
                            <input type="email" class="form-control border-start-0 ps-0" id="email" name="email"
                                placeholder="admin@certivalidate.com" required>
                        </div>
                    </div>

                    <div class="mb-4 position-relative">
                        <div class="d-flex justify-content-between">
                            <label for="login-password" class="form-label fw-bold small text-muted">Password</label>
                        </div>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i
                                    class="fa-solid fa-lock text-muted"></i></span>
                            <input type="password" class="form-control border-start-0 border-end-0 ps-0"
                                id="login-password" name="password" placeholder="••••••••" required>
                            <span class="input-group-text bg-light cursor-pointer toggle-password"
                                data-target="login-password" style="cursor: pointer;">
                                <i class="fa-solid fa-eye text-muted"></i>
                            </span>
                        </div>
                    </div>

                    <button type="submit"
                        class="btn btn-primary w-100 py-3 mt-2 rounded-pill shadow fw-bold hover-scale show-loader">
                        Log In
                    </button>

                    <div class="text-center mt-4">
                        <p class="small text-muted">Don't have an account? <a href="{{ url_for('register') }}"
                                class="text-primary fw-bold text-decoration-none">Register</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
